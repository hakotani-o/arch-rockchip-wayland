# This is a basic workflow to help you get started with Actions

name: arch-rockchip-wayland
on: workflow_dispatch
#workflow_dispatch
#[push]
jobs:
  command:
    name: Use Linux commands
    runs-on: ubuntu-24.04-arm
    env:
     FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
    permissions:
      contents: write  # これがリリース作成に必要

    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4

      - name: all
        run: |
          chmod +x *.sh
          ./control-main.sh
            echo "============================"
            ls -l
            echo "============================="
 
#      - name: Upload a diisk image
#        uses: actions/upload-artifact@v4.5.0
#        with:
#         name: ubuntu-image-orangepi-5
#         path: ./Ubuntu-*img.xz
#         compression-level: 0
#          # The desired behavior if no files are found using the provided path.
#         if-no-files-found: error

      - name: Get current date
        id: date
        run: echo "now=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Get kernel version
        id: kernel
        run: cat kernel_version >> $GITHUB_OUTPUT
        
# 旧: upload-artifact のステップをコメントアウトまたは削除し、以下を追加
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          # 実行するたびにユニークなタグ名（例: build-1, build-2...）を付けます
          tag_name: build-${{ github.run_number }}
          name: "Orange Pi 5 / 5-PLUS Disk Image Build ${{ github.run_number }}"
          body: |
            Arch linux Rockchip Wayland ディスクイメージ Orange Pi 5 / 5-PLUS 
            ビルド日時: ${{ steps.date.outputs.now }}
            iカーネル : ${{ steps.kernel.outputs.kernel_version }}
          draft: false
          prerelease: false
          # ここに圧縮済みファイルのパスを指定します
          files: |
            ./Arch-linux-*img.xz
            ./linux-aarch64-rockchip-7*
            ./linux-aarch64-rockchip-headers-7*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
